<ion-content class="bg-white">

      </div>
    </header>

    <section class="mt-6 px-6">

    </section>

        <div class="bg-slate-50 p-4 rounded-lg">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=WALLET-882-X9" alt="QR Code" class="w-full h-auto"/>
        </div>
        <p class="mt-6 text-xs text-slate-400 uppercase tracking-widest font-bold">ID: WALLET-882-X9</p>

        Presenta este código en caja antes de realizar tu pago para acumular beneficios.
      </p>
