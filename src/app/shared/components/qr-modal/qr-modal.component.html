<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Escanear Código</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()">
        <ion-icon name="close-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding bg-slate-50">
  <div class="flex flex-col items-center justify-center min-h-full">
    <div class="bg-white p-8 rounded-3xl shadow-2xl relative overflow-hidden flex flex-col items-center w-full max-w-[320px] aspect-square">
      <!-- Background QR -->
      <div class="relative w-full h-full bg-slate-50 p-4 rounded-xl">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=WALLET-882-X9" 
             alt="QR Code" 
             class="w-full h-auto opacity-90"/>
        
        <!-- Scanner Animation Plane -->
        <div class="scanner-plane absolute top-0 left-0 w-full h-[2px] bg-primary shadow-[0_0_15px_#0df2cc] z-10"></div>
        
        <!-- Corner Brackets -->
        <div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-primary rounded-tl-lg"></div>
        <div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-primary rounded-tr-lg"></div>
        <div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-primary rounded-bl-lg"></div>
        <div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-primary rounded-br-lg"></div>
      </div>
    </div>

    <div class="mt-12 text-center px-6">
      <h2 class="text-xl font-bold text-slate-800 mb-2">Paga y Suma Puntos</h2>
      <p class="text-slate-500 leading-relaxed font-medium">
        Encuentra el código QR en el establecimiento y sitúalo frente a este código para registrar tu visita.
      </p>
    </div>

    <div class="mt-10 animate-pulse bg-emerald-50 text-emerald-600 px-4 py-2 rounded-full text-sm font-bold flex items-center gap-2">
      <div class="w-2 h-2 bg-emerald-600 rounded-full"></div>
      LISTO PARA ESCANEAR
    </div>
  </div>
</ion-content>
